<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CV Thomas Blanché - Ingénieur Informatique & Master Jeux Vidéo" />
    <title>CV Thomas Blanché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              brand: {
                400: "#60A5FA",
                500: "#3B82F6",
                600: "#2563EB",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      html {
        scroll-behavior: smooth;
      }
      iframe {
        border: none;
        width: 100%;
        background: transparent;
        min-height: 1500px;
      }
    </style>
  </head>
  <body class="bg-slate-950 font-sans text-slate-100 antialiased">
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.22),_transparent_42%),radial-gradient(circle_at_85%_15%,_rgba(14,165,233,0.12),_transparent_28%),radial-gradient(circle_at_bottom,_rgba(15,23,42,0.85),_transparent_55%)]"></div>

    <header class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/80 backdrop-blur">
      <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-5 py-4 md:px-8" aria-label="Navigation principale">
        <a href="../index.html#projets" class="text-sm font-semibold text-slate-200 transition hover:text-white md:text-base">
          ← Retour au portfolio
        </a>
        <a href="../CV/CV_Thomas_Blanche.pdf" target="_blank" download class="rounded-full border border-brand-500/40 bg-brand-500/10 px-4 py-2 text-sm font-medium text-brand-400 transition hover:border-brand-400 hover:bg-brand-500/20 hover:text-white">
          ⬇ Télécharger PDF
        </a>
      </nav>
    </header>

    <main class="mx-auto w-full max-w-6xl px-5 pb-16 pt-12 md:px-8 md:pb-24 md:pt-16">
      <iframe src="../CV/ThomasBlancheCV.html" id="cv-frame" class="w-full rounded-lg"></iframe>
    </main>

    <script>
      // Ajuster la hauteur de l'iframe en fonction du contenu
      const iframe = document.getElementById('cv-frame');
      function resizeIframe() {
        try {
          const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          if (iframeDoc) {
            iframe.style.height = (iframeDoc.documentElement.scrollHeight + 20) + 'px';
          }
        } catch (e) {
          console.log('Impossible d\'accéder au contenu de l\'iframe (CORS)');
        }
      }
      
      iframe.addEventListener('load', resizeIframe);
      window.addEventListener('resize', resizeIframe);
      
      // Essayer de redimensionner au chargement initial
      setTimeout(resizeIframe, 500);
      setTimeout(resizeIframe, 1000);
    </script>
  </body>
</html>
